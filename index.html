<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>十周年快乐 - 跳动的爱心</title>
    <!-- 引入书法艺术字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #ffe4e1; 
            background-image: 
                radial-gradient(circle, rgba(255, 182, 193, 0.2) 0%, rgba(255, 105, 180, 0.4) 100%),
                url('https://images.unsplash.com/photo-1526047932273-341f2a7631f9?q=80&w=1500&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }
        #text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #D32F2F;
            font-family: 'Zhi Mang Xing', cursive;
            font-size: clamp(2rem, 10vw, 5rem);
            font-weight: normal;
            pointer-events: none;
            text-shadow: 
                -2px -2px 0 #fff,  
                 2px -2px 0 #fff,
                -2px  2px 0 #fff,
                 2px  2px 0 #fff,
                 0px 0px 20px rgba(255, 255, 255, 0.8);
            z-index: 10;
            white-space: nowrap;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="heartCanvas"></canvas>
        <div id="text">十周年快乐！</div>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        // 设置画布尺寸为全屏
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const IMAGE_ENLARGE = 11;
        const COLORS = ["#FF0000", "#FFA500", "#FFFF00", "#00FF00"];
        let currentColorIndex = 0;

        function heartFunction(t, centerX, centerY) {
            let x = 17 * Math.pow(Math.sin(t), 3);
            let y = -(16 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            x *= IMAGE_ENLARGE;
            y *= IMAGE_ENLARGE;
            x += centerX;
            y += centerY;
            return { x, y };
        }

        function scatterInside(x, y, centerX, centerY, beta = 0.15) {
            const ratioX = -beta * Math.log(Math.random());
            const ratioY = -beta * Math.log(Math.random());
            const dx = ratioX * (x - centerX);
            const dy = ratioY * (y - centerY);
            return { x: x - dx, y: y - dy };
        }

        function shrink(x, y, centerX, centerY, ratio) {
            const force = -1 / Math.pow(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2), 0.6);
            const dx = ratio * force * (x - centerX);
            const dy = ratio * force * (y - centerY);
            return { x: x - dx, y: y - dy };
        }

        function curve(p) {
            return 2 * (2 * Math.sin(4 * p)) / (2 * Math.PI);
        }

        class Heart {
            constructor(generateFrame = 20) {
                this.points = [];
                this.edgeDiffusionPoints = [];
                this.centerDiffusionPoints = [];
                this.allFrames = {};
                this.generateFrame = generateFrame;
                this.build(1000);
            }

            build(number) {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                for (let i = 0; i < number; i++) {
                    const t = Math.random() * 2 * Math.PI;
                    const pos = heartFunction(t, centerX, centerY);
                    this.points.push(pos);
                }
                this.points.forEach(p => {
                    for (let i = 0; i < 3; i++) {
                        this.edgeDiffusionPoints.push(scatterInside(p.x, p.y, centerX, centerY, 0.05));
                    }
                });
                for (let i = 0; i < 5000; i++) {
                    const p = this.points[Math.floor(Math.random() * this.points.length)];
                    this.centerDiffusionPoints.push(scatterInside(p.x, p.y, centerX, centerY, 0.27));
                }
            }

            calc(frame) {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const p = frame / 10 * Math.PI;
                const ratio = 15 * curve(p);
                const haloRadius = 4 + 6 * (1 + curve(p));
                const haloNumber = Math.floor(1500 + 2000 * Math.abs(Math.pow(curve(p), 2)));

                const framePoints = [];
                for (let i = 0; i < haloNumber; i++) {
                    const t = Math.random() * 2 * Math.PI;
                    let pos = heartFunction(t, centerX, centerY);
                    pos = shrink(pos.x, pos.y, centerX, centerY, haloRadius);
                    pos.x += Math.random() * 120 - 60;
                    pos.y += Math.random() * 120 - 60;
                    framePoints.push({ x: pos.x, y: pos.y, size: Math.random() < 0.3 ? 2 : 1 });
                }

                const calcPos = (x, y, r) => {
                    const force = 1 / Math.pow(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2), 0.42);
                    const dx = r * force * (x - centerX) + (Math.random() * 2 - 1);
                    const dy = r * force * (y - centerY) + (Math.random() * 2 - 1);
                    return { x: x - dx, y: y - dy };
                };

                this.points.forEach(p => {
                    const pos = calcPos(p.x, p.y, ratio);
                    framePoints.push({ x: pos.x, y: pos.y, size: Math.random() * 2 + 1 });
                });
                this.edgeDiffusionPoints.forEach(p => {
                    const pos = calcPos(p.x, p.y, ratio);
                    framePoints.push({ x: pos.x, y: pos.y, size: Math.random() * 1 + 1 });
                });
                this.centerDiffusionPoints.forEach(p => {
                    const pos = calcPos(p.x, p.y, ratio);
                    framePoints.push({ x: pos.x, y: pos.y, size: Math.random() * 1 + 1 });
                });
                this.allFrames[frame] = framePoints;
            }

            render(frame, color) {
                const currentFrame = Math.floor(frame) % this.generateFrame;
                if (!this.allFrames[currentFrame]) {
                    this.calc(currentFrame);
                }
                const points = this.allFrames[currentFrame];
                ctx.fillStyle = color;
                points.forEach(p => {
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                });
            }
        }

        const heart = new Heart(20);
        let frameCount = 0;
        let lastColorChangeTime = 0;

        function animate(timestamp) {
            if (!lastColorChangeTime) lastColorChangeTime = timestamp;
            if (timestamp - lastColorChangeTime > 1000) {
                currentColorIndex = (currentColorIndex + 1) % COLORS.length;
                lastColorChangeTime = timestamp;
            }

            ctx.fillStyle = 'rgba(255, 192, 203, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            heart.render(frameCount, COLORS[currentColorIndex]);
            frameCount += 0.5; 
            requestAnimationFrame(animate);
        }

        window.onload = () => requestAnimationFrame(animate);
    </script>
</body>
</html>
